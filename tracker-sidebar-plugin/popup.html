<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 300;
      background: #fff;
      color: #475569;
      font-size: 13px;
    }
    .header {
      padding: 22px 24px 16px;
      text-align: center;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    }
    .header h1 {
      font-size: 10px;
      font-weight: 300;
      color: #94a3b8;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .header p {
      font-size: 11px;
      font-weight: 300;
      color: #cbd5e1;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 20px 24px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
    }
    .stat { text-align: center; }
    .stat-number {
      font-size: 28px;
      font-weight: 200;
      color: #334155;
      line-height: 1.1;
    }
    .stat-label {
      font-size: 9px;
      font-weight: 300;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }
    .stat-number.orange { color: #d97556; }
    .actions {
      padding: 14px 24px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
    }
    .btn {
      width: 100%;
      padding: 9px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 6px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: #6b9dc2;
      background: #fff;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }
    .btn:hover {
      background: rgba(107, 157, 194, 0.04);
      border-color: rgba(107, 157, 194, 0.3);
    }
    .footer {
      padding: 12px 24px;
      text-align: center;
      font-size: 9px;
      font-weight: 300;
      color: #cbd5e1;
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Wer trackt wen warum wozu</h1>
    <p>Dein Blick hinter die Kulissen</p>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-number" id="tracker-count">&ndash;</div>
      <div class="stat-label">Tracker</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="request-count">&ndash;</div>
      <div class="stat-label">Anfragen</div>
    </div>
    <div class="stat">
      <div class="stat-number orange" id="blocked-count">&ndash;</div>
      <div class="stat-label">Unterbunden</div>
    </div>
  </div>
  <div class="actions">
    <button class="btn" id="toggle-sidebar">&Uuml;bersicht &ouml;ffnen</button>
  </div>
  <div class="footer">Arbeitet vollst&auml;ndig lokal &mdash; keine Daten verlassen deinen Browser</div>
  <script src="popup.js"></script>
</body>
</html>
