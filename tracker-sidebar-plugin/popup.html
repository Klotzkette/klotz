<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 300;
      background: #f8fafc;
      color: #4a5568;
      font-size: 13px;
    }
    .header {
      background: #fff;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #e2e8f0;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 400;
      color: #1a202c;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 11px;
      font-weight: 300;
      color: #94a3b8;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 18px 20px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
    }
    .stat {
      text-align: center;
    }
    .stat-number {
      font-size: 24px;
      font-weight: 300;
      color: #334155;
    }
    .stat-label {
      font-size: 10px;
      font-weight: 400;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-number.orange { color: #e07a3a; }
    .actions {
      padding: 16px 20px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #64748b;
      background: #f8fafc;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
      color: #334155;
    }
    .privacy {
      padding: 14px 20px;
      text-align: center;
      font-size: 10px;
      font-weight: 300;
      color: #94a3b8;
      line-height: 1.5;
    }
    .privacy strong {
      font-weight: 400;
      color: #6b9dc2;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Wer trackt wen warum wozu</h1>
    <p>Dein Blick hinter die Kulissen</p>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-number" id="tracker-count">&ndash;</div>
      <div class="stat-label">Tracker</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="request-count">&ndash;</div>
      <div class="stat-label">Anfragen</div>
    </div>
    <div class="stat">
      <div class="stat-number orange" id="blocked-count">&ndash;</div>
      <div class="stat-label">Unterbunden</div>
    </div>
  </div>
  <div class="actions">
    <button class="btn" id="toggle-sidebar">&Uuml;bersicht &ouml;ffnen</button>
  </div>
  <div class="privacy">
    <strong>Arbeitet vollst&auml;ndig lokal</strong> &mdash; keine Daten verlassen deinen Browser.
  </div>
  <script src="popup.js"></script>
</body>
</html>
