<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
    }
    .header {
      background: linear-gradient(135deg, #0f3460, #16213e);
      padding: 16px;
      text-align: center;
    }
    .header h1 {
      font-size: 18px;
      color: #fff;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 11px;
      color: #8888aa;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 14px;
      background: rgba(0,0,0,0.2);
    }
    .stat {
      text-align: center;
    }
    .stat-number {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }
    .stat-label {
      font-size: 10px;
      color: #8888aa;
      text-transform: uppercase;
    }
    .stat-number.red { color: #e74c3c; }
    .info {
      padding: 14px;
      text-align: center;
      color: #8888aa;
      font-size: 12px;
      line-height: 1.5;
    }
    .info strong { color: #b0b0d0; }
    .actions {
      padding: 10px 14px 14px;
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-toggle {
      background: #0f3460;
      color: #fff;
    }
    .btn-toggle:hover { background: #1a4f8e; }
    .btn-block {
      background: #e74c3c;
      color: #fff;
    }
    .btn-block:hover { background: #c0392b; }
  </style>
</head>
<body>
  <div class="header">
    <h1>&#128737; Tracker Sidebar</h1>
    <p>Tracker &amp; Cookie Monitor</p>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-number" id="tracker-count">-</div>
      <div class="stat-label">Tracker</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="request-count">-</div>
      <div class="stat-label">Requests</div>
    </div>
    <div class="stat">
      <div class="stat-number red" id="blocked-count">-</div>
      <div class="stat-label">Blockiert</div>
    </div>
  </div>
  <div class="info">
    Klicke auf den <strong>Tracker</strong>-Tab am rechten Seitenrand, um die Sidebar zu öffnen und alle Tracker im Detail zu sehen.
  </div>
  <div class="actions">
    <button class="btn btn-toggle" id="toggle-sidebar">Sidebar öffnen</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
