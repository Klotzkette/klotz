<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-weight: 300;
      background: #f8fafc;
      color: #475569;
      font-size: 13px;
      overflow: hidden;
    }

    .header {
      padding: 28px 28px 20px;
      text-align: center;
      background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #1e293b 100%);
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -40%;
      left: -20%;
      width: 140%;
      height: 140%;
      background: radial-gradient(ellipse at 30% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .header-icon {
      width: 36px;
      height: 36px;
      margin: 0 auto 12px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      position: relative;
    }
    .header h1 {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
      position: relative;
    }
    .header p {
      font-size: 11px;
      font-weight: 300;
      color: rgba(148, 163, 184, 0.8);
      position: relative;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 20px 20px 16px;
    }
    .stat {
      text-align: center;
      flex: 1;
      padding: 14px 8px 12px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.1);
      box-shadow: 0 2px 8px rgba(100, 116, 139, 0.06);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(100, 116, 139, 0.1);
    }
    .stat-number {
      font-size: 26px;
      font-weight: 300;
      color: #facc15;
      line-height: 1.1;
      letter-spacing: -0.5px;
    }
    .stat-label {
      font-size: 9px;
      font-weight: 400;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-top: 4px;
    }

    .actions {
      padding: 4px 20px 16px;
    }
    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 10px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: #fff;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
    }
    .btn:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
      transform: translateY(-1px);
    }
    .btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 6px rgba(59, 130, 246, 0.3);
    }

    .footer {
      padding: 12px 20px 16px;
      text-align: center;
      font-size: 9px;
      font-weight: 300;
      color: #94a3b8;
      letter-spacing: 0.2px;
    }
    .footer-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: #3b82f6;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">&#128065;</div>
    <h1>Tracker Viewer</h1>
    <p>Dein Blick hinter die Kulissen</p>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-number" id="tracker-count">&ndash;</div>
      <div class="stat-label">Tracker</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="request-count">&ndash;</div>
      <div class="stat-label">Anfragen</div>
    </div>
  </div>
  <div class="actions">
    <button class="btn" id="toggle-sidebar">&Uuml;bersicht &ouml;ffnen</button>
  </div>
  <div class="footer"><span class="footer-dot"></span>Arbeitet vollst&auml;ndig lokal &mdash; reine Anzeige, kein Blocking</div>
  <script src="popup.js"></script>
</body>
</html>
