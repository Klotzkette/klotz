<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #fff;
      overflow: hidden;
      transition: background 0.4s ease;
    }

    body.mode-genz {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    body.mode-formal {
      background: linear-gradient(135deg, #2c3e50 0%, #4a0e0e 100%);
    }

    .header {
      text-align: center;
      padding: 16px 16px 8px;
    }

    .header h1 {
      font-size: 17px;
      font-weight: 800;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      transition: all 0.3s;
    }

    .header .subtitle {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 2px;
      transition: all 0.3s;
    }

    /* Mode Selector */
    .mode-selector {
      display: flex;
      gap: 6px;
      padding: 0 16px;
      margin-bottom: 10px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px 8px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all 0.25s ease;
      backdrop-filter: blur(4px);
    }

    .mode-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    .mode-btn.active {
      background: rgba(255,255,255,0.3);
      border-color: #fff;
      box-shadow: 0 0 12px rgba(255,255,255,0.2);
    }

    .mode-btn .mode-icon {
      display: block;
      font-size: 22px;
      margin-bottom: 4px;
    }

    .mode-btn .mode-label {
      display: block;
      font-size: 11px;
      opacity: 0.9;
    }

    .controls {
      padding: 8px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 14px;
      backdrop-filter: blur(4px);
    }

    .control-row label {
      font-size: 13px;
      font-weight: 600;
    }

    .control-row .desc {
      font-size: 10px;
      opacity: 0.8;
      margin-top: 1px;
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
      margin-left: 10px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      border-radius: 24px;
      transition: 0.3s;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background: #00e676;
    }

    input:checked + .slider::before {
      transform: translateX(20px);
    }

    /* Intensity Slider */
    .intensity-section {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 14px;
      backdrop-filter: blur(4px);
    }

    .intensity-section .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .intensity-section label {
      font-size: 13px;
      font-weight: 600;
    }

    .intensity-value {
      font-size: 12px;
      background: rgba(255,255,255,0.25);
      padding: 2px 8px;
      border-radius: 8px;
      font-weight: 700;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    /* Akt-Anzeige */
    .akt-info {
      padding: 0 16px;
      margin-bottom: 8px;
    }

    .akt-bar {
      display: flex;
      gap: 3px;
      margin-bottom: 4px;
    }

    .akt-segment {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.2);
      position: relative;
      overflow: hidden;
    }

    .akt-segment .fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      border-radius: 2px;
      transition: width 0.3s;
    }

    .akt-segment:nth-child(1) .fill { background: rgba(255,255,255,0.5); width: 100%; }
    .akt-segment:nth-child(2) .fill { background: rgba(255,255,255,0.7); width: 100%; }
    .akt-segment:nth-child(3) .fill { background: #fff; width: 100%; }

    .akt-labels {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      opacity: 0.6;
    }

    /* Action Button */
    .action-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 4px 16px 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 800;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .action-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .action-btn:active {
      transform: translateY(0);
    }

    .action-btn#transformBtn {
      background: #fff;
    }

    body.mode-genz .action-btn#transformBtn { color: #764ba2; }
    body.mode-formal .action-btn#transformBtn { color: #4a0e0e; }

    .action-btn#revertBtn {
      background: #ff5252;
      color: #fff;
    }

    .footer {
      text-align: center;
      padding: 0 16px 10px;
      font-size: 10px;
      opacity: 0.5;
    }

    /* Emoji-Toggle nur im Gen-Z Modus sichtbar */
    .genz-only { display: block; }
    body.mode-formal .genz-only { display: none; }
  </style>
</head>
<body class="mode-genz">
  <div class="header">
    <h1 id="headerTitle">Text-Transformer 🎭</h1>
    <div class="subtitle" id="headerSubtitle">Drei Akte der Verwandlung</div>
  </div>

  <!-- Modus-Auswahl -->
  <div class="mode-selector">
    <button class="mode-btn active" id="modeGenz" data-mode="genz">
      <span class="mode-icon">💀🔥</span>
      <span class="mode-label">Gen-Z / Alpha</span>
    </button>
    <button class="mode-btn" id="modeFormal" data-mode="formal">
      <span class="mode-icon">📜⚖️</span>
      <span class="mode-label">Bildungssprache</span>
    </button>
  </div>

  <!-- Akt-Visualisierung -->
  <div class="akt-info">
    <div class="akt-bar">
      <div class="akt-segment"><div class="fill"></div></div>
      <div class="akt-segment"><div class="fill"></div></div>
      <div class="akt-segment"><div class="fill"></div></div>
    </div>
    <div class="akt-labels">
      <span id="aktLabel1">Akt I: Subtil</span>
      <span id="aktLabel2">Akt II: Kontrast</span>
      <span id="aktLabel3">Akt III: Eskalation</span>
    </div>
  </div>

  <div class="controls">
    <div class="control-row">
      <div>
        <label>Wort-Ersetzung</label>
        <div class="desc" id="descReplace">Normale Wörter durch Slang ersetzen</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggleReplace" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="control-row">
      <div>
        <label id="labelFillers">Füllwörter & Kommentare</label>
        <div class="desc" id="descFillers">Digga, lowkey + parenthetische Kommentare</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggleFillers" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="control-row genz-only">
      <div>
        <label>Emoji-Ketten</label>
        <div class="desc">💀😭🔥 nach Sätzen einfügen</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggleEmojis" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="intensity-section">
      <div class="row">
        <label>Intensität</label>
        <span class="intensity-value" id="intensityLabel">50%</span>
      </div>
      <input type="range" id="intensity" min="10" max="100" value="50" step="5">
    </div>
  </div>

  <button class="action-btn" id="transformBtn">SEITE TRANSFORMIEREN 🎭</button>
  <button class="action-btn" id="revertBtn" style="display:none;">ZURÜCKSETZEN ↩️</button>

  <div class="footer" id="footerText">Drei Akte der Verwandlung — v2.0</div>

  <script src="js/popup.js"></script>
</body>
</html>
