<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 16px 16px 8px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 800;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .header .subtitle {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 2px;
    }

    .controls {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 14px;
      backdrop-filter: blur(4px);
    }

    .control-row label {
      font-size: 13px;
      font-weight: 600;
    }

    .control-row .desc {
      font-size: 10px;
      opacity: 0.8;
      margin-top: 1px;
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
      margin-left: 10px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      border-radius: 24px;
      transition: 0.3s;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background: #00e676;
    }

    input:checked + .slider::before {
      transform: translateX(20px);
    }

    /* Intensity Slider */
    .intensity-section {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 14px;
      backdrop-filter: blur(4px);
    }

    .intensity-section .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .intensity-section label {
      font-size: 13px;
      font-weight: 600;
    }

    .intensity-value {
      font-size: 12px;
      background: rgba(255,255,255,0.25);
      padding: 2px 8px;
      border-radius: 8px;
      font-weight: 700;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    /* Action Button */
    .action-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 4px 16px 14px;
      padding: 12px;
      font-size: 14px;
      font-weight: 800;
      color: #764ba2;
      background: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .action-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .action-btn:active {
      transform: translateY(0);
    }

    .action-btn.active {
      background: #00e676;
      color: #fff;
    }

    .footer {
      text-align: center;
      padding: 0 16px 12px;
      font-size: 10px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Gen-Z Übersetzer 💀🔥</h1>
    <div class="subtitle">Mach jeden Text sheesh-würdig</div>
  </div>

  <div class="controls">
    <div class="control-row">
      <div>
        <label>Wort-Ersetzung</label>
        <div class="desc">Normale Wörter durch Slang ersetzen</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggleReplace" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="control-row">
      <div>
        <label>Füllwörter</label>
        <div class="desc">Digga, literally, lowkey einfügen</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggleFillers" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="control-row">
      <div>
        <label>Emoji-Ketten</label>
        <div class="desc">💀😭🔥 nach Sätzen einfügen</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggleEmojis" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="intensity-section">
      <div class="row">
        <label>Intensität</label>
        <span class="intensity-value" id="intensityLabel">50%</span>
      </div>
      <input type="range" id="intensity" min="10" max="100" value="50" step="5">
    </div>
  </div>

  <button class="action-btn" id="transformBtn">SEITE TRANSFORMIEREN 🚀</button>
  <button class="action-btn" id="revertBtn" style="display:none; background:#ff5252; color:#fff;">ZURÜCKSETZEN ↩️</button>

  <div class="footer">no cap, fr fr - Version 1.0</div>

  <script src="js/popup.js"></script>
</body>
</html>
